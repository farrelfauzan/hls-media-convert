services:
  # FastAPI Application
  api:
    build:
      context: .
      dockerfile: Dockerfile
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=redis://performa-edu-redis:6379/0
      - CELERY_BROKER_URL=redis://performa-edu-redis:6379/0
      - CELERY_RESULT_BACKEND=redis://performa-edu-redis:6379/0
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      - AWS_REGION=${AWS_REGION:-us-east-1}
      - S3_BUCKET_NAME=${S3_BUCKET_NAME}
      - S3_ENDPOINT_URL=${S3_ENDPOINT_URL:-}
      - WEBHOOK_URL=${WEBHOOK_URL:-}
      - WEBHOOK_SECRET=${WEBHOOK_SECRET:-}
      - API_KEY=${API_KEY:-}
    volumes:
      - ./app:/app/app
      - temp_data:/tmp/hls_converter
    restart: unless-stopped
    networks:
      - performa-network

  # Celery Worker
  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=redis://performa-edu-redis:6379/0
      - CELERY_BROKER_URL=redis://performa-edu-redis:6379/0
      - CELERY_RESULT_BACKEND=redis://performa-edu-redis:6379/0
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      - AWS_REGION=${AWS_REGION:-us-east-1}
      - S3_BUCKET_NAME=${S3_BUCKET_NAME}
      - S3_ENDPOINT_URL=${S3_ENDPOINT_URL:-}
      - WEBHOOK_URL=${WEBHOOK_URL:-}
      - WEBHOOK_SECRET=${WEBHOOK_SECRET:-}
      - API_KEY=${API_KEY:-}
    volumes:
      - ./app:/app/app
      - temp_data:/tmp/hls_converter
    restart: unless-stopped
    networks:
      - performa-network

networks:
  performa-network:
    external: true

volumes:
  temp_data:
